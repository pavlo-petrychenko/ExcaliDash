# ExcaliDash — self-hosted Excalidraw dashboard/library.
# Deployed via Coolify (build_pack=dockercompose) at https://excalidraw.pavlop.dev,
# behind the Cloudflare tunnel + Cloudflare Access (3-email policy).
#
#   frontend (nginx)  ── the ONLY publicly-exposed service (Coolify assigns the FQDN) ──
#       serves the SPA and proxies /api/ + /socket.io/ to backend:8000 (BACKEND_URL).
#   backend (Node/Prisma)  ── internal ── drawings + users + collab, SQLite in a volume.
#
# Auth: local email/password (AUTH_MODE=local). Cloudflare Access is the outer gate.
# JWT_SECRET / CSRF_SECRET are intentionally unset: the backend auto-generates and
# persists them in the SQLite volume (fine for this single-instance deploy).

# --- excalidash-mcp deploy note (plan §7, task T9) ------------------------
# Option A APPLIED: `backend` now builds from this repo's source
# (backend/Dockerfile) instead of pulling the pinned upstream image, so
# backend/src/middleware/auth.ts's additive shared/duplicate/history/restore
# route reachability (still under the existing drawings:read/drawings:write
# scopes — no new scope, see plan §3.1/§0.2 #2) reaches this deployment.
# `frontend` below stays pinned to the upstream tag (Option A allows that).
# Do NOT reintroduce a custom `networks:` block (see the comment near the
# bottom of this file — commit 142d25c removed it so Coolify's Traefik can
# route). excalidash-mcp itself is a local stdio subprocess and is never
# deployed here (see `mcp-server/README.md`).
# ---------------------------------------------------------------------------
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=8000
      - NODE_ENV=production
      - AUTH_MODE=local
      # All traffic arrives through Traefik -> frontend nginx (both trusted),
      # which forward X-Forwarded-Proto=https, so secure cookies work.
      - TRUST_PROXY=true
      # Traefik + Cloudflare already enforce HTTPS; avoid a double-redirect loop.
      - ENFORCE_HTTPS_REDIRECT=false
      - FRONTEND_URL=https://excalidraw.pavlop.dev
    volumes:
      - excalidash-data:/app/prisma
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8000/health',(r)=>process.exit(r.statusCode===200?0:1))"
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: zimengxiong/excalidash-frontend:0.5.1
    restart: unless-stopped
    environment:
      - BACKEND_URL=backend:8000
    expose:
      - "80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

# No custom network: Coolify places all compose services on one managed network
# that its Traefik proxy is attached to (service-name DNS still works). A custom
# network puts containers on a second net Traefik can't reach -> routing 504s.

volumes:
  excalidash-data:
